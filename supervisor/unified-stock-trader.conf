[program:unified-stock-trader]
; Portfolio bot: exit orders, directional constraints, multi-position, hold timeout
command=/home/lee/code/stock/.venv313/bin/python -u /home/lee/code/stock/unified_hourly_experiment/trade_unified_hourly.py --checkpoint-dir /home/lee/code/stock/unified_hourly_experiment/checkpoints/portfolio_deploy --epoch 7 --stock-symbols NVDA,MSFT,META,GOOG,NET,PLTR,DBX,ANGI,BKNG,EBAY,EXPE,MTCH,NWSA,NYT,TRIP,YELP,Z --min-edge 0.001 --fee-rate 0.001 --max-positions 5 --live --loop
directory=/home/lee/code/stock
user=lee
autostart=true
autorestart=true
stopwaitsecs=30
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/unified-stock-trader.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/unified-stock-trader-error.log
stderr_logfile_maxbytes=10MB
environment=PYTHONPATH="/home/lee/code/stock",PYTHONUNBUFFERED="1"

[program:stock-cache-refresh]
command=/home/lee/code/stock/.venv313/bin/python -u /home/lee/code/stock/scripts/refresh_stock_caches.py
directory=/home/lee/code/stock
user=lee
autostart=true
autorestart=true
stopwaitsecs=60
stopasgroup=true
killasgroup=true
stdout_logfile=/var/log/supervisor/stock-cache-refresh.log
stdout_logfile_maxbytes=10MB
stderr_logfile=/var/log/supervisor/stock-cache-refresh-error.log
stderr_logfile_maxbytes=5MB
environment=PYTHONPATH="/home/lee/code/stock",PYTHONUNBUFFERED="1"
