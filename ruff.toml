"tests/test_cross_asset_prompt.py" = ["E402", "PLC0415"]
"tests/test_dedupe_orders.py" = ["E402", "PLC0415"]
"tests/test_multi_horizon_features.py" = ["E402", "PLC0415"]
"tests/test_rl_signal_features.py" = ["E402", "PLC0415"]
"tests/test_rl_signal_masking.py" = ["E402", "PLC0415"]
"tests/test_signal_calibrator.py" = ["E402", "PLC0415"]

[lint.isort]
known-first-party = ["src", "unified_hourly_experiment", "binanceneural", "rl_trading_agent_binance"]
force-single-line = false
lines-after-imports = 2

[lint.pylint]
max-args = 10  # More lenient than default 5
max-branches = 15  # More lenient than default 12
max-statements = 60  # More lenient than default 50
