# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(rl_trading_agent_binance/hybrid_prompt\.py|rl_trading_agent_binance/trade_binance_live\.py|evaluate_binance_lora_candidate\.py|scripts/evaluate_binance_lora_candidate\.py|trltraining/.*\.py|tests/test_hybrid_allocation_prompt\.py|tests/test_hybrid_prompt_parsing\.py|tests/test_rl_only_fallback\.py|tests/test_evaluate_binance_lora_candidate\.py|tests/test_validate_hybrid_cycle_snapshots\.py|tests/test_trltraining\.py)$
      - id: ruff-format
        files: ^(rl_trading_agent_binance/hybrid_prompt\.py|rl_trading_agent_binance/trade_binance_live\.py|evaluate_binance_lora_candidate\.py|scripts/evaluate_binance_lora_candidate\.py|trltraining/.*\.py|tests/test_hybrid_allocation_prompt\.py|tests/test_hybrid_prompt_parsing\.py|tests/test_rl_only_fallback\.py|tests/test_evaluate_binance_lora_candidate\.py|tests/test_validate_hybrid_cycle_snapshots\.py|tests/test_trltraining\.py)$

  - repo: local
    hooks:
      - id: ty-rl-trading-agent-binance
        name: ty (rl_trading_agent_binance)
        entry: bash -lc 'if [ -x .venv313/bin/python ]; then .venv313/bin/python -m ty check rl_trading_agent_binance/hybrid_prompt.py rl_trading_agent_binance/trade_binance_live.py evaluate_binance_lora_candidate.py scripts/evaluate_binance_lora_candidate.py trltraining; else python -m ty check rl_trading_agent_binance/hybrid_prompt.py rl_trading_agent_binance/trade_binance_live.py evaluate_binance_lora_candidate.py scripts/evaluate_binance_lora_candidate.py trltraining; fi'
        language: system
        pass_filenames: false
        files: ^(rl_trading_agent_binance/hybrid_prompt\.py|rl_trading_agent_binance/trade_binance_live\.py|evaluate_binance_lora_candidate\.py|scripts/evaluate_binance_lora_candidate\.py|trltraining/.*\.py)$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
